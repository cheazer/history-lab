<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Git Archaeologist</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0f1115;
      --panel: #161a22;
      --panel-2: #10141b;
      --border: #2a3240;
      --text: #e7edf7;
      --muted: #9aa7b8;
      --accent: #3aa655;
      --accent-hover: #2f8f48;
      --danger: #ef4444;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(180deg, #0c0f14, #111827);
      color: var(--text);
      font-family: Inter, Segoe UI, Arial, sans-serif;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .card {
      width: min(760px, 100%);
      background: rgba(22, 26, 34, 0.96);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 2rem;
    }

    p {
      margin: 0 0 20px;
      color: var(--muted);
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .full { grid-column: 1 / -1; }

    label {
      display: block;
      margin: 0 0 6px;
      font-size: 0.92rem;
      color: #cbd5e1;
    }

    input, select {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--panel-2);
      color: var(--text);
      outline: none;
    }

    input::placeholder { color: #6b7280; }

    .checkbox {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #cbd5e1;
      margin-top: 8px;
    }

    .checkbox input {
      width: auto;
      accent-color: var(--accent);
    }

    .dropzone {
      border: 1.5px dashed #3b465a;
      border-radius: 14px;
      padding: 18px;
      text-align: center;
      color: var(--muted);
      background: rgba(16, 20, 27, 0.7);
    }

    .dropzone strong {
      color: var(--text);
    }

    .dropzone.dragover {
      border-color: var(--accent);
      background: rgba(58, 166, 85, 0.08);
      color: var(--text);
    }

    .actions {
      margin-top: 20px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    button {
      border: none;
      border-radius: 10px;
      padding: 12px 18px;
      font-weight: 600;
      cursor: pointer;
      color: white;
      background: var(--accent);
    }

    button:hover { background: var(--accent-hover); }

    .secondary {
      background: #273244;
    }

    .secondary:hover {
      background: #344155;
    }

    .message {
      margin-top: 18px;
      padding: 12px 14px;
      border-radius: 10px;
      display: none;
      white-space: pre-wrap;
    }

    .message.error {
      display: block;
      background: rgba(239, 68, 68, 0.12);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #fca5a5;
    }

    .message.success {
      display: block;
      background: rgba(34, 197, 94, 0.12);
      border: 1px solid rgba(34, 197, 94, 0.3);
      color: #bbf7d0;
    }

    .hint {
      margin-top: 8px;
      font-size: 0.88rem;
      color: var(--muted);
    }

    .file-name {
      margin-top: 10px;
      font-size: 0.92rem;
      color: #cbd5e1;
    }

    @media (max-width: 700px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Git Archaeologist</h1>
    <p>Generate a backdated Git history from a ZIP upload or local folder path.</p>

    <form id="form" enctype="multipart/form-data">
      <div class="grid">
        <div class="full">
          <label for="sourceType">Source Type</label>
          <select id="sourceType" name="sourceType">
            <option value="zip">ZIP Upload</option>
            <option value="folder">Local Folder</option>
          </select>
        </div>

        <div class="full" id="zipSection">
          <label for="archive">ZIP File</label>
          <input id="archive" name="archive" type="file" accept=".zip" />
          <div class="hint">Used when Source Type is ZIP Upload.</div>
        </div>

        <div class="full" id="folderSection" style="display:none;">
          <label for="sourcePath">Source Path</label>
          <input id="sourcePath" name="sourcePath" type="text" placeholder="C:\path\to\source" />
          <div class="hint">Used when Source Type is Local Folder.</div>
        </div>

        <div class="full">
          <label for="repoName">GitHub Repo Name</label>
          <input id="repoName" name="repoName" type="text" placeholder="my-demo-repo" />
        </div>

        <div class="full">
          <label for="githubToken">GitHub Token</label>
          <input id="githubToken" name="githubToken" type="password" placeholder="ghp_..." />
        </div>

        <div class="full">
          <label class="checkbox">
            <input id="repoPrivate" name="repoPrivate" type="checkbox" />
            Private repository
          </label>
        </div>

        <div>
          <label for="startDate">Start Date</label>
          <input id="startDate" name="startDate" type="date" />
        </div>

        <div>
          <label for="endDate">End Date</label>
          <input id="endDate" name="endDate" type="date" />
        </div>

        <div class="full">
          <label for="authorName">Author Name</label>
          <input id="authorName" name="authorName" type="text" placeholder="Your Name" />
        </div>

        <div class="full">
          <label for="authorEmail">Author Email</label>
          <input id="authorEmail" name="authorEmail" type="email" placeholder="you@example.com" />
        </div>
      </div>

      <div class="actions">
        <button type="submit">Run Simulation</button>
        <button type="button" class="secondary" id="resetBtn">Reset</button>
      </div>

      <div id="fileName" class="file-name"></div>
      <div id="message" class="message"></div>
    </form>
  </div>

  <script>
    const form = document.getElementById('form');
    const sourceType = document.getElementById('sourceType');
    const zipSection = document.getElementById('zipSection');
    const folderSection = document.getElementById('folderSection');
    const archive = document.getElementById('archive');
    const fileName = document.getElementById('fileName');
    const message = document.getElementById('message');
    const resetBtn = document.getElementById('resetBtn');
    const sourcePath = document.getElementById('sourcePath');

    function showMessage(text, type) {
      message.className = 'message ' + type;
      message.textContent = text;
      message.style.display = 'block';
    }

    function clearMessage() {
      message.className = 'message';
      message.textContent = '';
      message.style.display = 'none';
    }

    function updateSourceUI() {
      const isZip = sourceType.value === 'zip';
      zipSection.style.display = isZip ? 'block' : 'none';
      folderSection.style.display = isZip ? 'none' : 'block';
      archive.required = isZip;
      sourcePath.required = !isZip;
    }

    sourceType.addEventListener('change', updateSourceUI);

    archive.addEventListener('change', () => {
      fileName.textContent = archive.files && archive.files[0]
        ? `Selected file: ${archive.files[0].name}`
        : '';
    });

    resetBtn.addEventListener('click', () => {
      form.reset();
      fileName.textContent = '';
      clearMessage();
      updateSourceUI();
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      clearMessage();

      const fd = new FormData(form);

      if (sourceType.value === 'folder') {
        fd.delete('archive');
      } else {
        fd.delete('sourcePath');
      }

      if (!fd.get('authorName')) fd.set('authorName', 'Git Archaeologist');
      if (!fd.get('authorEmail')) fd.set('authorEmail', 'git-archaeologist@example.com');

      try {
        const res = await fetch('/api/simulate', {
          method: 'POST',
          body: fd
        });

        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.error || 'Request failed');
        }

        showMessage(
          `Success!\nRepo: ${data.repoUrl}\nCommits: ${data.commits.length}\nChunks: ${data.chunks.length}`,
          'success'
        );
      } catch (err) {
        showMessage(err.message || 'Unknown error', 'error');
      }
    });

    updateSourceUI();
  </script>
</body>
</html>
